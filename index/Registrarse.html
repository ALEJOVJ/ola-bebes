<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/Registrarse.css">
</head>
<body>

  <header class="mainHeader">
    <div class="mainHeaderContainer">
      <div class="mainHeaderLogo">
        <img src="../IMG/Imagen1.jpg" alt="ASIS" class="logoAsis">
      </div>

      <button class="mainHeaderToggle" id="menu-toggle" aria-label="Abrir menú">
        <div class="mainHeaderBar"></div>
        <div class="mainHeaderBar"></div>
        <div class="mainHeaderBar"></div>
      </button>

      <nav class="mainNav" id="main-nav">
        <div class="menuOptions">
          <ul class="mainNavList">
                <li class="mainNavItem">
                  <a href="#" class="mainNavLink">Procesos</a>
                </li>
                <li class="mainNavItem">
                    <a href="#" class="mainNavLink">Bienes</a>
                </li>
                <li class="mainNavItem">
                    <a href="#" class="mainNavLink">Ambientes</a>
                </li>
          </ul>
        </div>
        <div class="login">
              <a href="login.html" class="mainNavLinkSecondary">Iniciar sesión</a>
              <img src="../IMG/log.png" alt="" class="logImg">

        </div>
      </nav>
    </div>
  </header>

  <main class="contentWrapper">
    <div class="formContainer">
      <form class="registroForm" action="/registro_2" method="post">
        <h2>Registro de Usuario</h2>
        
        <div class="formGroupFlex">
          <div class="formField">
            <label for="tipo_identificacion">Tipo de Documento</label>
            <select id="tipo_identificacion" name="tipo_documento_usuario" required>
              <option value="">Seleccione...</option>
              <option value="CC">Cédula de Ciudadanía</option>
              <option value="TI">Tarjeta de Identidad</option>
              <option value="CE">Cédula de Extranjería</option>
            </select>
          </div>

          <div class="formField">
            <label for="numero_de_documento">Documento</label>
            <input type="text" id="numero_de_documento" placeholder="Número de documento" name="numero_de_documento" required>
          </div>
        </div>
        
        <div class="formGroupFlex">
          <div class="formField">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre_usuario" placeholder="Nombre usuario" maxlength="50" required>
          </div>

          <div class="formField">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" placeholder="Apellido usuario" name="apellido_usuario" maxlength="50" required>
          </div>
        </div>

        <div class="formGroupFlex">
          <div class="formField">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" placeholder="Número de teléfono" name="telefono_usuario" required>
          </div>

          <div class="formField">
            <label for="correo">Correo institucional</label>
            <input type="email" id="correo" placeholder="ejemplo@soy.sena.edu.co" name="correo_usuario" maxlength="50" required>
          </div>
        </div>

        <div class="formGroupFlex">
          <div class="formField">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" placeholder="Contraseña" name="contraseña_usuario" maxlength="10" required>
          </div>

          <div class="formField">
            <label for="rol">Rol</label>
            <select id="rol" name="id_rol" required>
              <option value="">Seleccione un rol...</option>
              <option value="1">Administrador</option>
              <option value="2">Cuentadante</option>
              <option value="3">Instructor</option>
              <option value="4">Técnico</option>
              <option value="5">Jefe Técnico</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn">Guardar</button>
      </form>
    </div>
  </main>

  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const mainNav = document.getElementById('main-nav');

    menuToggle.addEventListener('click', () => {
        mainNav.classList.toggle('mainNavOpen')
    })
  </script>

</body>
</html>
