<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASIS - Registrar Ticket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/ticketsGlobal.css">
    <link rel="stylesheet" href="../styles/Registrar_t.css">
</head>
<body>
    <div class="barraSuperior">
        <div class="barraSuperiorIzq">
            <button class="volver" type="button" onclick="window.history.back()">&larr; Volver</button>
            <img src="../IMG/Imagen1.jpg" alt="Logo ASIS" class="logo">
            <div class="tituloApp">ASIS
                <span>Registrar ticket de daño · CGMLTI</span>
            </div>
        </div>
        <div class="barraSuperiorDer">
            <span class="etiquetaRol">Rol: Cuentadante</span>
            <div class="avatar">JR</div>
        </div>
    </div>

    <main class="contenidoFormulario">
        <div class="encabezadoPagina">
            <h1>Registrar ticket</h1>
            <p>Diligencia los datos del daño reportado para crear un nuevo ticket de seguimiento.</p>
        </div>

        <form class="tarjetaFormulario" id="registrarTicketForm">

            <!-- Mensaje de error / éxito -->
            <p id="mensajeFormulario" class="mensajeFormulario" style="display:none;"></p>

            <div class="tituloSeccion">Datos del reporte</div>
            <div class="cuadriculaFormulario">
                <div class="campoFormulario campoCompleto">
                    <label for="motivo">Motivo del ticket</label>
                    <textarea id="motivo" name="motivo" rows="4" placeholder="Describe la falla o el daño presentado…" maxlength="255" required></textarea>
                </div>

                <div class="campoFormulario">
                    <label for="fecha_salida">Fecha de salida</label>
                    <input type="date" id="fecha_salida" name="fecha_salida" required>
                </div>

                
            </div>

            <div class="tituloSeccion">Activo relacionado</div>
            <div class="cuadriculaFormulario">
                <div class="campoFormulario">
                    <label for="id_equipo">Equipo</label>
                    <select id="id_equipo" name="id_equipo" required>
                        <option value="">Seleccione un equipo…</option>
                        <option value="1">Computador de escritorio — HP EliteDesk (HP-88213X)</option>
                        <option value="2">Computador portátil — Lenovo ThinkPad (LN-TP-11245)</option>
                        <option value="3">Televisor — Samsung (SM-TV-77210)</option>
                        <option value="4">Videobeam — Hp (EP-VB-40982)</option>
                    </select>
                </div>

                <div class="campoFormulario">
                    <label for="id_ambiente">Ambiente</label>
                    <select id="id_ambiente" name="id_ambiente" required>
                        <option value="">Seleccione un ambiente…</option>
                        <option value="1">Ambiente 204 · Bloque C</option>
                        <option value="2">Ambiente 310 · Bloque A</option>
                        <option value="3">Ambiente 112 · Bloque B</option>
                        <option value="4">Auditorio Principal</option>
                        <option value="5">Sala de Sistemas 1</option>
                    </select>
                </div>
            </div>

            <div class="tituloSeccion">Personas </div>
            <div class="cuadriculaFormulario">
                <div class="campoFormulario">
                    <label for="creado_por">Reportado por</label>
                    <select id="creado_por" name="creado_por" required>
                        <option value="">Seleccione un usuario…</option>
                        <option value="1">Laura Gómez (Instructora)</option>
                        <option value="2">Carlos Peña (Instructor)</option>
                        <option value="3">Marcela Duarte (Instructora)</option>
                        <option value="4">Diego Salazar (Instructor)</option>
                    </select>
                </div>



                <div class="campoFormulario" id="campoMotivoNoReparacion" style="display:none;">
                    <label for="id_motivo_no_reparacion">Motivo de no reparación</label>
                    <select id="id_motivo_no_reparacion" name="id_motivo_no_reparacion">
                        <option value="">Seleccione un motivo…</option>
                        <option value="1">Repuesto descontinuado</option>
                        <option value="2">Costo de reparación mayor al del activo</option>
                        <option value="3">Daño irreparable</option>
                    </select>
                </div>
            </div>

            <div class="accionesFormulario">
                <a href="/frontend/index/Consultar_t.html" class="btnSecundario">Cancelar</a>
                <button type="submit" class="btnPrincipal">Registrar ticket</button>
            </div>

        </form>
    </main>

    <script>
        const estadoSelect = document.getElementById('id_estado');
        const campoMotivoNoReparacion = document.getElementById('campoMotivoNoReparacion');
        const motivoNoReparacionSelect = document.getElementById('id_motivo_no_reparacion');

        function actualizarMotivoNoReparacion() {
            if (estadoSelect.value === 'sinreparo') {
                campoMotivoNoReparacion.style.display = 'flex';
                motivoNoReparacionSelect.required = true;
            } else {
                campoMotivoNoReparacion.style.display = 'none';
                motivoNoReparacionSelect.required = false;
                motivoNoReparacionSelect.value = '';
            }
        }

        estadoSelect.addEventListener('change', actualizarMotivoNoReparacion);
        actualizarMotivoNoReparacion();

        document.getElementById('registrarTicketForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const mensajeFormulario = document.getElementById('mensajeFormulario');
            mensajeFormulario.style.display = 'none';

            const payload = {
                motivo: document.getElementById('motivo').value,
                fecha_salida: document.getElementById('fecha_salida').value,
                fecha_retorno: document.getElementById('fecha_retorno').value || null,
                id_equipo: document.getElementById('id_equipo').value,
                id_ambiente: document.getElementById('id_ambiente').value,
                creado_por: document.getElementById('creado_por').value,
                asignado_a: document.getElementById('asignado_a').value || null,
                id_estado: document.getElementById('id_estado').value,
                id_motivo_no_reparacion: document.getElementById('id_motivo_no_reparacion').value || null
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/tickets', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    mensajeFormulario.className = 'mensajeFormulario exito';
                    mensajeFormulario.textContent = 'Ticket registrado correctamente.';
                    mensajeFormulario.style.display = 'block';
                    this.reset();
                    actualizarMotivoNoReparacion();
                } else {
                    mensajeFormulario.className = 'mensajeFormulario error';
                    mensajeFormulario.textContent = data.detail || 'No se pudo registrar el ticket.';
                    mensajeFormulario.style.display = 'block';
                }
            } catch (error) {
                mensajeFormulario.className = 'mensajeFormulario error';
                mensajeFormulario.textContent = 'No se pudo conectar con el servidor.';
                mensajeFormulario.style.display = 'block';
            }
        });
    </script>
</body>
</html>
