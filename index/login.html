<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <title>ASIS</title>
</head>
<body>
<header class="mainHeader">
    <div class="mainHeaderContainer">
      <div class="mainHeaderLogo">
        <img src="../IMG/Imagen1.jpg" alt="ASIS" class="logoAsis">
      </div>

      <button class="mainHeaderToggle" id="menu-toggle" aria-label="Abrir menú">
        <div class="mainHeaderBar"></div>
        <div class="mainHeaderBar"></div>
        <div class="mainHeaderBar"></div>
      </button>

      <nav class="mainNav" id="main-nav">
        <div class="menuOptions">
          <ul class="mainNavList">
                <li class="mainNavItem">
                  <a href="#" class="mainNavLink">Procesos</a>
                </li>
                <li class="mainNavItem">
                    <a href="#" class="mainNavLink">Bienes</a>
                </li>
                <li class="mainNavItem">
                    <a href="#" class="mainNavLink">Ambientes</a>
                </li>
          </ul>
        </div>
        <div class="login">
              <a href="Registrarse.html" class="mainNavLinkSecondary">Registrarse</a>
              <img src="../IMG/log.png" alt="" class="logImg">

        </div>
      </nav>
    </div>
  </header>

    

    <!-- CONTENEDOR LOGIN -->
    <div class="container">

        <div class="infoContainer">
            <h3>INGRESO DE USUARIOS</h3>
        </div>

        <div class="loginContainer">

            <form class="loginForm" id="loginForm">

                <h1>INICIAR SESIÓN</h1>

                <!-- Mensaje de error -->
                <p id="mensajeError" style="color:red; text-align:center; display:none;"></p>

                <!-- Campo: Correo -->
                <label for="correo_usuario">Correo</label>
                <div class="inputContenedor">
                    <svg class="inputIcono" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                    <input
                        type="email"
                        id="correo_usuario"
                        name="correo_usuario"
                        placeholder="correo@ejemplo.com"
                        required
                    >
                </div>

                <!-- Campo: Contraseña -->
                <label for="contrasena_usuario">Contraseña</label>
                <div class="inputContenedor">
                    <svg class="inputIcono" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                    </svg>
                    <input
                        type="password"
                        id="contrasena_usuario"
                        name="contrasena_usuario"
                        placeholder="Contraseña"
                        required
                    >
                </div>

                <button type="submit" class="btnPrincipal">
                    Continuar
                </button>

            </form>

            <p class="textoSecundario">
                ¿No tienes una cuenta?
                <a href="/frontend/index/Registrarse.html">Regístrate</a>
            </p>
            <p class="textoSecundario">
                <a href="Recuperar_c.html">¿Olvidaste tu contraseña?</a>
            </p>

        </div>

    </div>

    <script>
        const menuToggle = document.getElementById('menu-toggle');

        const mainNav = document.getElementById('main-nav');

        /* añadir el evento click y su funcionamiento*/
        menuToggle.addEventListener('click', () => {
            mainNav.classList.toggle('mainNavOpen')
        })

        
    </script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const correo = document.getElementById('correo_usuario').value;
            const contrasena = document.getElementById('contrasena_usuario').value;
            const mensajeError = document.getElementById('mensajeError');

            mensajeError.style.display = 'none';

            try {
                const response = await fetch('http://127.0.0.1:8000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        correo: correo,
                        contrasena: contrasena
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Guardar datos del usuario en el navegador
                    localStorage.setItem('usuario', JSON.stringify(data));
                    
                    // Redirigir según el rol
                    if (data.rol === 1) {
                        window.location.href = 'instructor.html';
                    } else if (data.rol === 2) {
                        window.location.href = 'tecnico.html';
                    } else if (data.rol === 3) {
                        window.location.href = 'admin.html';
                    }
                } else {
                    mensajeError.textContent = data.detail;
                    mensajeError.style.display = 'block';
                }

            } catch (error) {
                mensajeError.textContent = 'No se pudo conectar con el servidor.';
                mensajeError.style.display = 'block';
            }
        });
    </script> 

</body>
</html>
