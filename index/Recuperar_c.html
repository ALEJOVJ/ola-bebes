<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <!-- Enlace al archivo CSS externo tradicional -->
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/Recuperar_c.css">
</head>
<body>

<header class="mainHeader">
    <div class="mainHeaderContainer">
        
        <div class="mainHeaderLogo">
            <img src="../IMG/Imagen1.jpg" alt="ASIS" class="logoAsis">
        </div>
        
        <button class="mainHeaderToggle" id="menu-toggle" aria-label="Abrir menú">
            <div class="mainHeaderBar"></div>
            <div class="mainHeaderBar"></div>
            <div class="mainHeaderBar"></div>
        </button>

        <nav class="mainNav" id="main-nav">
            <div class="menuOptions">
                <ul class="mainNavList">
                    <li class="mainNavItem">
                        <a href="#" class="mainNavLink">Procesos</a>
                    </li>
                    <li class="mainNavItem">
                        <a href="#" class="mainNavLink">Bienes</a>
                    </li>
                    <li class="mainNavItem">
                        <a href="#" class="mainNavLink">Ambientes</a>
                    </li>
                </ul> 
            </div>
            
            <div class="login">
                <a href="login.html" class="mainNavLinkSecondary">Iniciar sesión</a>
                <img src="../IMG/log.png" alt="Login" class="logImg">
            </div>
        </nav>

    </div>
</header>

    <!-- CONTENEDOR PRINCIPAL FIJO -->
    <div class="container">

        <!-- PASO 1: SOLICITAR RECUPERACIÓN -->
        <div id="step-1" class="step">
            <h2>Recuperar Contraseña</h2>
            <p>Ingresa el correo electrónico asociado a tu cuenta de instructor/técnico.</p>
            
            <form>
                <div class="inputContenedor">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>
                <button type="submit" class="btnPrincipal">Enviar enlace de recuperación</button>
            </form>
            <a href="/index/login.html">Cancelar</a>
        </div>

        

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const mainNav = document.getElementById('main-nav');

        menuToggle.addEventListener('click', () => {
            mainNav.classList.toggle('mainNavOpen')
        })
    </script>

</body>
</html>
